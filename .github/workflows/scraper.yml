name: Scraper Pipeline

on:
  workflow_dispatch:
    inputs:
      config_path:
        description: "Scraper config path"
        required: true
        default: "scraper/configs/full_scale.yaml"
      skip_existing:
        description: "Skip already persisted videos"
        required: true
        type: boolean
        default: true
      no_resume:
        description: "Ignore checkpoint table and rerun all sources"
        required: true
        type: boolean
        default: false
      comments:
        description: "Comments per video"
        required: true
        default: "0"
      replies:
        description: "Replies per comment"
        required: true
        default: "0"
      delay:
        description: "Delay between sources (seconds)"
        required: true
        default: "15"
      retry_empty:
        description: "Retries when source returns 0 rows"
        required: true
        default: "2"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: read
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      MS_TOKEN: ${{ secrets.MS_TOKEN }}
      TIKTOK_HEADLESS: ${{ vars.TIKTOK_HEADLESS || 'false' }}
      TIKTOK_BROWSER: ${{ vars.TIKTOK_BROWSER || 'webkit' }}
      SCRAPER_DB_COMMIT_EVERY: ${{ vars.SCRAPER_DB_COMMIT_EVERY || '50' }}
      TIKTOK_MAX_SESSION_RECOVERIES: ${{ vars.TIKTOK_MAX_SESSION_RECOVERIES || '3' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate required secrets
        run: |
          test -n "$DATABASE_URL" || (echo "Missing secret DATABASE_URL" && exit 1)
          test -n "$MS_TOKEN" || (echo "Missing secret MS_TOKEN" && exit 1)

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt
          python -m playwright install webkit

      - name: Write optional proxies file
        id: proxies
        env:
          SCRAPER_PROXIES: ${{ secrets.SCRAPER_PROXIES }}
        run: |
          if [ -n "$SCRAPER_PROXIES" ]; then
            printf "%s\n" "$SCRAPER_PROXIES" > /tmp/scraper_proxies.txt
            echo "path=/tmp/scraper_proxies.txt" >> "$GITHUB_OUTPUT"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Init DB schema
        run: |
          python -m scraper init-db

      - name: Run scraper
        run: |
          set -euo pipefail
          CMD=(python -m scraper scrape-all "${{ github.event.inputs.config_path }}" \
            --comments "${{ github.event.inputs.comments }}" \
            --replies "${{ github.event.inputs.replies }}" \
            --delay "${{ github.event.inputs.delay }}" \
            --retry-empty "${{ github.event.inputs.retry_empty }}" \
            --summary-path "/tmp/full_scale_summary.json")

          if [ "${{ github.event.inputs.skip_existing }}" = "true" ]; then
            CMD+=(--skip-existing)
          fi
          if [ "${{ github.event.inputs.no_resume }}" = "true" ]; then
            CMD+=(--no-resume)
          fi
          if [ -n "${{ steps.proxies.outputs.path }}" ]; then
            CMD+=(--proxies-file "${{ steps.proxies.outputs.path }}")
          fi

          printf 'Running command: %q ' "${CMD[@]}"
          echo
          "${CMD[@]}"

      - name: Upload summaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-summaries-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            /tmp/full_scale_summary.json
            scraper/data/raw/*summary*.json
